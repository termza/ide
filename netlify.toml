# Netlify build configuration for the PPL Study Guide PWA.
# It's a fully static site — no build step, no framework.
# Production deploys publish the repo root.

[build]
  publish = "."
  command = ""

# Cache app shell briefly; let the service worker handle long-lived caching.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=300, must-revalidate"

# The service worker MUST NOT be cached by the CDN, or updates won't roll out.
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Static assets can be cached longer (the service worker also caches them).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

# Manifest must be served with the right content-type.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"
